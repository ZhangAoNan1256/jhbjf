<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理 - JHB积分商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">🏠 JHB积分商城</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-white" id="currentUser"></span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-3">
            <div class="col">
                <h2>📋 订单管理</h2>
                <p class="text-muted">创建订单，查询订单记录</p>
            </div>
        </div>

        <!-- 用户选择 -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <label class="form-label">用户ID</label>
                        <input type="number" class="form-control" id="userId" placeholder="请输入用户ID">
                    </div>
                    <div class="col-md-6 d-flex align-items-end">
                        <button class="btn btn-primary" onclick="loadOrderList()">
                            🔍 查询我的订单
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 创建订单表单 -->
        <div class="card mb-4">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">➕ 创建订单</h5>
            </div>
            <div class="card-body">
                <form id="orderForm" onsubmit="createOrder(event)">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">商品ID</label>
                            <input type="number" class="form-control" id="goodsId" required>
                            <small class="text-muted">可从商品列表页面获取商品ID</small>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">优惠券ID（可选）</label>
                            <input type="number" class="form-control" id="couponId">
                            <small class="text-muted">如有优惠券可填写，否则留空</small>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success">✅ 提交订单</button>
                    <a href="goods.html" class="btn btn-outline-primary ms-2">📦 查看商品列表</a>
                </form>
            </div>
        </div>

        <!-- 订单列表 -->
        <div class="card">
            <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">📊 订单列表</h5>
                <button class="btn btn-light btn-sm" onclick="loadOrderList()">🔃 刷新</button>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>订单ID</th>
                            <th>用户ID</th>
                            <th>商品名称</th>
                            <th>消耗积分</th>
                            <th>优惠券</th>
                            <th>订单状态</th>
                            <th>创建时间</th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody">
                        <tr>
                            <td colspan="7" class="text-center">请先查询订单</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="global.js"></script>
    <script>
        // 页面加载
        window.onload = function() {
            updateCurrentUserDisplay();
            
            // 如果有选中的用户，自动填充
            const userId = getCurrentUserId();
            if (userId) {
                document.getElementById('userId').value = userId;
            }
            
            // 如果URL中有goodsId参数，自动填充
            const urlParams = new URLSearchParams(window.location.search);
            const goodsId = urlParams.get('goodsId');
            if (goodsId) {
                document.getElementById('goodsId').value = goodsId;
            }
        };

        // 更新当前用户显示
        function updateCurrentUserDisplay() {
            const userId = getCurrentUserId();
            if (userId) {
                document.getElementById('currentUser').textContent = `当前用户ID: ${userId}`;
            } else {
                document.getElementById('currentUser').textContent = '未选择用户';
            }
        }

        // 创建订单
        async function createOrder(event) {
            event.preventDefault();
            
            const userId = document.getElementById('userId').value;
            
            if (!userId || isNaN(parseInt(userId))) {
                tip('请输入有效的用户ID');
                return;
            }

            const goodsId = document.getElementById('goodsId').value;
            if (!goodsId || isNaN(parseInt(goodsId))) {
                tip('请输入有效的商品ID');
                return;
            }

            // 后端期望参数名为 userId 和 goodsId（驼峰），不需要coupon_id
            const data = {
                userId: parseInt(userId),
                goodsId: parseInt(goodsId)
            };

            console.log('提交订单数据:', data); // 调试日志

            try {
                const response = await axios.post('/api/order/create', data);
                
                // 检查响应码
                if (response.data.code === 0) {
                    tip(response.data.message || '订单创建成功');
                    
                    // 清空表单
                    document.getElementById('goodsId').value = '';
                    document.getElementById('couponId').value = '';
                    
                    // 重新加载订单列表
                    loadOrderList();
                } else {
                    tip(response.data.message || '订单创建失败');
                }
            } catch (error) {
                handleError(error);
            }
        }

        // 加载订单列表
        async function loadOrderList() {
            const userId = document.getElementById('userId').value;
            
            if (!userId) {
                tip('请先输入用户ID');
                return;
            }

            setCurrentUserId(userId);
            updateCurrentUserDisplay();

            try {
                // 后端返回结构为 {code, message, list: [...]}
                const response = await axios.get(`/api/order/list?userId=${userId}`);
                displayOrderList(response.data.list || []);
            } catch (error) {
                handleError(error);
            }
        }

        // 显示订单列表
        function displayOrderList(orders) {
            const tbody = document.getElementById('orderTableBody');
            
            if (!orders || orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">暂无订单记录</td></tr>';
                return;
            }

            tbody.innerHTML = orders.map(order => `
                <tr>
                    <td>${order.id}</td>
                    <td>${order.userId}</td>
                    <td>${order.goodsName || '商品ID: ' + order.goodsId}</td>
                    <td><span class="text-danger fw-bold">${order.usePoint}</span></td>
                    <td>
                        ${order.couponName ? 
                            `<span class="badge bg-warning">${order.couponName}</span>` : 
                            '<span class="badge bg-secondary">未使用</span>'}
                    </td>
                    <td>
                        <span class="badge bg-success">已完成</span>
                    </td>
                    <td>${order.createTime ? order.createTime.substring(0, 19) : '-'}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
