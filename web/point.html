<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分中心 - JHB积分商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            margin-bottom: 20px;
        }
        .balance-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .balance-number {
            font-size: 3rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">🏠 JHB积分商城</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-white" id="currentUser"></span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-3">
            <div class="col">
                <h2>💰 积分中心</h2>
                <p class="text-muted">核算里程积分，查询积分余额和变动日志</p>
            </div>
        </div>

        <!-- 用户选择 -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <label class="form-label">用户ID</label>
                        <input type="number" class="form-control" id="userId" placeholder="请输入用户ID">
                    </div>
                    <div class="col-md-6 d-flex align-items-end">
                        <button class="btn btn-primary me-2" onclick="loadPointData()">
                            🔍 查询积分
                        </button>
                        <button class="btn btn-success" onclick="calculatePoints()">
                            ⚡ 核算积分
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 积分余额卡片 -->
        <div class="card balance-card mb-4">
            <div class="card-body text-center">
                <h4>当前积分余额</h4>
                <div class="balance-number" id="pointBalance">0</div>
                <p class="mb-0">积分</p>
            </div>
        </div>

        <!-- 积分日志 -->
        <div class="card">
            <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">📊 积分变动日志</h5>
                <button class="btn btn-light btn-sm" onclick="loadPointLogs()">🔃 刷新</button>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>用户ID</th>
                            <th>变动类型</th>
                            <th>积分变化</th>
                            <th>变动后余额</th>
                            <th>备注</th>
                            <th>创建时间</th>
                        </tr>
                    </thead>
                    <tbody id="logsTableBody">
                        <tr>
                            <td colspan="7" class="text-center">请先查询用户积分</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="global.js"></script>
    <script>
        // 页面加载
        window.onload = function() {
            updateCurrentUserDisplay();
            
            // 如果有选中的用户，自动填充并查询
            const userId = getCurrentUserId();
            if (userId) {
                document.getElementById('userId').value = userId;
                loadPointData();
            }
        };

        // 更新当前用户显示
        function updateCurrentUserDisplay() {
            const userId = getCurrentUserId();
            if (userId) {
                document.getElementById('currentUser').textContent = `当前用户ID: ${userId}`;
            } else {
                document.getElementById('currentUser').textContent = '未选择用户';
            }
        }

        // 加载积分数据（余额和日志）
        async function loadPointData() {
            const userId = document.getElementById('userId').value;
            
            if (!userId) {
                tip('请先输入用户ID');
                return;
            }

            // 保存用户ID
            setCurrentUserId(userId);
            updateCurrentUserDisplay();

            try {
                // 并行请求余额和日志
                const [balanceRes, logsRes] = await Promise.all([
                    axios.get(`/api/point/balance?userId=${userId}`),
                    axios.get(`/api/point/logs?userId=${userId}`)
                ]);

                // 显示余额 - 后端返回结构为 {code, message, totalPoint}
                document.getElementById('pointBalance').textContent = balanceRes.data.totalPoint || 0;
                
                // 显示日志 - 后端返回结构为 {code, message, list: [...]}
                displayPointLogs(logsRes.data.list || []);
            } catch (error) {
                handleError(error);
            }
        }

        // 核算积分
        async function calculatePoints() {
            const userId = document.getElementById('userId').value;
            
            if (!userId) {
                tip('请先输入用户ID');
                return;
            }

            if (!confirm('确定要核算该用户的未核算里程吗？')) {
                return;
            }

            try {
                // 后端期望参数名为 userId（驼峰）
                const response = await axios.post('/api/point/calculate', { userId: parseInt(userId) });
                tip(response.data.message || '核算成功');
                
                // 重新加载数据
                loadPointData();
            } catch (error) {
                handleError(error);
            }
        }

        // 加载积分日志
        async function loadPointLogs() {
            const userId = document.getElementById('userId').value;
            
            if (!userId) {
                tip('请先输入用户ID');
                return;
            }

            try {
                const response = await axios.get(`/api/point/logs?userId=${userId}`);
                displayPointLogs(response.data);
            } catch (error) {
                handleError(error);
            }
        }

        // 显示积分日志
        function displayPointLogs(logs) {
            const tbody = document.getElementById('logsTableBody');
            
            if (!logs || logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">暂无积分日志</td></tr>';
                return;
            }

            tbody.innerHTML = logs.map(log => `
                <tr>
                    <td>${log.id}</td>
                    <td>${log.userId}</td>
                    <td>
                        <span class="badge ${getLogTypeBadge(log.changeType)}">
                            ${getLogTypeText(log.changeType)}
                        </span>
                    </td>
                    <td>
                        <span class="${log.changePoint >= 0 ? 'text-success' : 'text-danger'} fw-bold">
                            ${log.changePoint >= 0 ? '+' : ''}${log.changePoint}
                        </span>
                    </td>
                    <td>${log.relationId}</td>
                    <td>${log.changeType}</td>
                    <td>${log.createTime ? log.createTime.substring(0, 19) : '-'}</td>
                </tr>
            `).join('');
        }

        // 获取日志类型徽章样式
        function getLogTypeBadge(type) {
            if (type && type.includes('里程')) return 'bg-success';
            if (type && type.includes('兑换')) return 'bg-warning';
            if (type && type.includes('消费')) return 'bg-info';
            return 'bg-secondary';
        }

        // 获取日志类型文本
        function getLogTypeText(type) {
            return type || '其他';
        }
    </script>
</body>
</html>
