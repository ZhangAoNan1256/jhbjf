<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品列表 - JHB积分商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            margin-bottom: 20px;
        }
        .goods-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .goods-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .goods-image {
            height: 150px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">🏠 JHB积分商城</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-white" id="currentUser"></span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-3">
            <div class="col">
                <h2>📦 商品列表</h2>
                <p class="text-muted">浏览可用积分兑换的商品，点击商品可前往下单</p>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="row mb-3">
            <div class="col">
                <button class="btn btn-primary" onclick="loadGoods()">
                    🔃 刷新商品列表
                </button>
                <a href="order.html" class="btn btn-success ms-2">
                    🛒 去下单
                </a>
            </div>
        </div>

        <!-- 商品列表 -->
        <div id="goodsList" class="row g-4">
            <div class="col-12 text-center">加载中...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="global.js"></script>
    <script>
        // 页面加载
        window.onload = function() {
            updateCurrentUserDisplay();
            loadGoods();
        };

        // 更新当前用户显示
        function updateCurrentUserDisplay() {
            const userId = getCurrentUserId();
            if (userId) {
                document.getElementById('currentUser').textContent = `当前用户ID: ${userId}`;
            } else {
                document.getElementById('currentUser').textContent = '未选择用户';
            }
        }

        // 加载商品列表
        async function loadGoods() {
            try {
                // 后端返回结构为 {code, message, list: [...]}
                const response = await axios.get('/api/goods/list');
                displayGoods(response.data.list || []);
            } catch (error) {
                handleError(error);
            }
        }

        // 显示商品列表
        function displayGoods(goods) {
            const container = document.getElementById('goodsList');
            
            if (!goods || goods.length === 0) {
                container.innerHTML = '<div class="col-12 text-center">暂无商品</div>';
                return;
            }

            container.innerHTML = goods.map(item => `
                <div class="col-md-6 col-lg-4">
                    <div class="card goods-card h-100">
                        <div class="goods-image">
                            🎁
                        </div>
                        <div class="card-body">
                            <h5 class="card-title">${item.goodsName}</h5>
                            <p class="card-text text-muted">需要积分: ${item.needPoint}</p>
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <span class="badge bg-danger fs-6">需要 ${item.needPoint} 积分</span>
                                <span class="badge bg-secondary">库存: ${item.stock}</span>
                            </div>
                            <a href="order.html?goodsId=${item.id}" class="btn btn-primary w-100">
                                🛒 立即下单
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
