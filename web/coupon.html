<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优惠券中心 - JHB积分商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            margin-bottom: 20px;
        }
        .coupon-card {
            border-left: 4px solid #ffc107;
            transition: transform 0.2s;
        }
        .coupon-card:hover {
            transform: translateX(5px);
        }
        .my-coupon-card {
            border-left: 4px solid #28a745;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">🏠 JHB积分商城</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-white" id="currentUser"></span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-3">
            <div class="col">
                <h2>🎫 优惠券中心</h2>
                <p class="text-muted">浏览可兑换优惠券，使用积分进行兑换</p>
            </div>
        </div>

        <!-- 用户选择 -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <label class="form-label">用户ID</label>
                        <input type="number" class="form-control" id="userId" placeholder="请输入用户ID">
                    </div>
                    <div class="col-md-6 d-flex align-items-end">
                        <button class="btn btn-primary me-2" onclick="loadMyCoupons()">
                            🔍 查询我的优惠券
                        </button>
                        <button class="btn btn-success" onclick="loadAvailableCoupons()">
                            📋 查看可兑换券
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 可兑换优惠券列表 -->
        <div class="card mb-4">
            <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
                <h5 class="mb-0">✨ 可兑换优惠券</h5>
                <button class="btn btn-dark btn-sm" onclick="loadAvailableCoupons()">🔃 刷新</button>
            </div>
            <div class="card-body">
                <div id="availableCouponsList" class="row g-3">
                    <div class="col-12 text-center">点击"查看可兑换券"按钮加载数据</div>
                </div>
            </div>
        </div>

        <!-- 我的优惠券列表 -->
        <div class="card">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">💳 我的优惠券</h5>
                <button class="btn btn-light btn-sm" onclick="loadMyCoupons()">🔃 刷新</button>
            </div>
            <div class="card-body">
                <div id="myCouponsList" class="row g-3">
                    <div class="col-12 text-center">请先输入用户ID并查询</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="global.js"></script>
    <script>
        // 页面加载
        window.onload = function() {
            updateCurrentUserDisplay();
            
            // 如果有选中的用户，自动填充
            const userId = getCurrentUserId();
            if (userId) {
                document.getElementById('userId').value = userId;
                loadAvailableCoupons();
                loadMyCoupons();
            }
        };

        // 更新当前用户显示
        function updateCurrentUserDisplay() {
            const userId = getCurrentUserId();
            if (userId) {
                document.getElementById('currentUser').textContent = `当前用户ID: ${userId}`;
            } else {
                document.getElementById('currentUser').textContent = '未选择用户';
            }
        }

        // 加载可兑换优惠券
        async function loadAvailableCoupons() {
            try {
                // 后端返回结构为 {code, message, list: [...]}
                const response = await axios.get('/api/coupon/list');
                displayAvailableCoupons(response.data.list || []);
            } catch (error) {
                handleError(error);
            }
        }

        // 显示可兑换优惠券
        function displayAvailableCoupons(coupons) {
            const container = document.getElementById('availableCouponsList');
            
            if (!coupons || coupons.length === 0) {
                container.innerHTML = '<div class="col-12 text-center">暂无可兑换优惠券</div>';
                return;
            }

            container.innerHTML = coupons.map(coupon => `
                <div class="col-md-6 col-lg-4">
                    <div class="card coupon-card h-100">
                        <div class="card-body">
                            <h5 class="card-title">${coupon.couponName}</h5>
                            <p class="card-text text-muted">优惠金额: ${coupon.discountAmount}元</p>
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="badge bg-danger fs-6">需要 ${coupon.needPoint} 积分</span>
                                <span class="badge bg-secondary">库存: ${coupon.stock}</span>
                            </div>
                            <button class="btn btn-warning w-100" 
                                    onclick="exchangeCoupon(${coupon.id}, '${coupon.couponName}', ${coupon.needPoint})"
                                    ${coupon.stock <= 0 ? 'disabled' : ''}>
                                ${coupon.stock > 0 ? '🎁 立即兑换' : '已售罄'}
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 兑换优惠券
        async function exchangeCoupon(couponId, couponName, pointCost) {
            const userId = document.getElementById('userId').value;
            
            if (!userId) {
                tip('请先输入用户ID');
                return;
            }

            if (!confirm(`确定要使用 ${pointCost} 积分兑换"${couponName}"吗？`)) {
                return;
            }

            try {
                // 后端期望参数名为 userId 和 couponId（驼峰）
                const response = await axios.post('/api/coupon/exchange', {
                    userId: parseInt(userId),
                    couponId: couponId
                });
                
                tip(response.data.message || '兑换成功');
                
                // 重新加载数据
                loadAvailableCoupons();
                loadMyCoupons();
            } catch (error) {
                handleError(error);
            }
        }

        // 加载我的优惠券
        async function loadMyCoupons() {
            const userId = document.getElementById('userId').value;
            
            if (!userId) {
                tip('请先输入用户ID');
                return;
            }

            setCurrentUserId(userId);
            updateCurrentUserDisplay();

            try {
                // 后端返回结构为 {code, message, list: [...]}
                const response = await axios.get(`/api/coupon/my?userId=${userId}`);
                displayMyCoupons(response.data.list || []);
            } catch (error) {
                handleError(error);
            }
        }

        // 显示我的优惠券
        function displayMyCoupons(coupons) {
            const container = document.getElementById('myCouponsList');
            
            if (!coupons || coupons.length === 0) {
                container.innerHTML = '<div class="col-12 text-center">暂无优惠券，快去兑换吧！</div>';
                return;
            }

            container.innerHTML = coupons.map(coupon => `
                <div class="col-md-6 col-lg-4">
                    <div class="card my-coupon-card h-100">
                        <div class="card-body">
                            <h5 class="card-title">${coupon.couponName}</h5>
                            <p class="card-text text-muted">优惠金额: ${coupon.discountAmount}元</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="badge ${coupon.status == 0 ? 'bg-success' : 'bg-secondary'}">
                                    ${coupon.status == 0 ? '✓ 未使用' : '✗ 已使用'}
                                </span>
                                <small class="text-muted">
                                    ${coupon.useTime ? '使用时间: ' + coupon.useTime.substring(0, 19) : '获得时间: ' + coupon.exchangeTime.substring(0, 19)}
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
